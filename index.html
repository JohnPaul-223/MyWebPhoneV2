<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PC Phone — Web Phone</title>
    <meta name="description" content="Browser-to-browser web phone with dialpad, messaging, location and contacts." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>

    <!-- ═══════════════════════ AUTH OVERLAY ═══════════════════════ -->
    <div id="authOverlay" class="auth-overlay">
      <div class="auth-card" role="main">

        <!-- Brand -->
        <div class="auth-brand">
          <div class="auth-brand__icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="40" height="40" rx="12" fill="url(#brandGrad)"/>
              <path d="M10.62 18.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V28c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="white"/>
              <defs>
                <linearGradient id="brandGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#4f46e5"/>
                  <stop offset="1" stop-color="#7c3aed"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="auth-brand__text">
            <span class="auth-brand__name">PC Phone</span>
            <span class="auth-brand__tagline">Browser-to-browser calls</span>
          </div>
        </div>

        <!-- Tab switcher -->
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab auth-tab--active" id="tabLogin" role="tab" aria-selected="true" aria-controls="panelLogin">Sign In</button>
          <button class="auth-tab" id="tabRegister" role="tab" aria-selected="false" aria-controls="panelRegister">Create Account</button>
        </div>

        <!-- Login panel -->
        <div class="auth-panel" id="panelLogin" role="tabpanel" aria-labelledby="tabLogin">
          <div class="auth-field">
            <label class="auth-label" for="loginUsername">Username or Phone Number</label>
            <input class="auth-input" id="loginUsername" type="text" autocomplete="username" placeholder="your_username or 0917…" spellcheck="false" />
          </div>
          <div class="auth-field">
            <label class="auth-label" for="loginPassword">Password</label>
            <div class="auth-input-wrap">
              <input class="auth-input" id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" />
              <button type="button" class="auth-eye" id="loginEye" aria-label="Show password" tabindex="-1">
                <svg id="loginEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <p class="auth-error" id="loginError" hidden></p>
          <button class="auth-submit" id="loginSubmit">Sign In</button>
          <p class="auth-switch">No account? <button type="button" class="auth-link" id="toRegister">Create one</button></p>
        </div>

        <!-- Register panel -->
        <div class="auth-panel auth-panel--hidden" id="panelRegister" role="tabpanel" aria-labelledby="tabRegister">
          <div class="auth-row">
            <div class="auth-field">
              <label class="auth-label" for="regName">Full Name</label>
              <input class="auth-input" id="regName" type="text" autocomplete="name" placeholder="Juan dela Cruz" />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="regPhone">Phone Number</label>
              <input class="auth-input" id="regPhone" type="tel" autocomplete="tel" placeholder="09171234567" maxlength="15" />
            </div>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="regUsername">Username</label>
            <input class="auth-input" id="regUsername" type="text" autocomplete="username" placeholder="juan_dc" spellcheck="false" maxlength="32" />
          </div>
          <div class="auth-row">
            <div class="auth-field">
              <label class="auth-label" for="regPassword">Password</label>
              <div class="auth-input-wrap">
                <input class="auth-input" id="regPassword" type="password" autocomplete="new-password" placeholder="••••••••" />
                <button type="button" class="auth-eye" id="regEye" aria-label="Show password" tabindex="-1">
                  <svg id="regEyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div class="auth-field">
              <label class="auth-label" for="regConfirm">Confirm Password</label>
              <input class="auth-input" id="regConfirm" type="password" autocomplete="new-password" placeholder="••••••••" />
            </div>
          </div>
          <p class="auth-error" id="regError" hidden></p>
          <button class="auth-submit" id="regSubmit">Create Account</button>
          <p class="auth-switch">Already have one? <button type="button" class="auth-link" id="toLogin">Sign in</button></p>
        </div>

      </div>
    </div>
    <!-- ══════════════════════════════════════════════════════════ -->

    <!-- ═══════════════════════ MAIN APP SHELL ═══════════════════════ -->
    <div class="app-shell" id="appShell" hidden>

      <!-- Top Status Bar -->
      <header class="phone-header">
        <div class="phone-header__left">
          <div class="phone-avatar" id="topbarAvatar">J</div>
          <div class="phone-header__info">
            <span class="phone-header__name" id="topbarName">—</span>
            <span class="phone-header__number" id="topbarNumber">—</span>
          </div>
        </div>
        <div class="phone-header__right">
          <div class="signal-bars">
            <span></span><span></span><span></span><span></span>
          </div>
          <button type="button" class="topbar__logout" id="logoutBtn" title="Sign out">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Page Views -->
      <main class="phone-body">

        <!-- ─── VIEW: DIALER (default) ─── -->
        <section class="view view--active" id="viewDialer">
          <div class="dialer-screen">
            <!-- Number display -->
            <div class="dial-display">
              <input
                class="dial-number"
                id="dialPill"
                type="tel"
                inputmode="numeric"
                placeholder="Enter number…"
                maxlength="12"
                autocomplete="off"
                spellcheck="false"
                aria-label="Phone number"
              />
              <span class="dial-status" id="statusText">Ready</span>
              <span class="dial-hint" id="hintText"></span>
            </div>

            <!-- Device selector -->
            <details class="device-details">
              <summary class="device-summary">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h4m0 0V3m0 2v2M7 5h4M3 12h18M3 19h18"/></svg>
                Devices
              </summary>
              <div class="device-block">
                <label class="device-label" for="micSelect">Microphone</label>
                <select id="micSelect" class="device-select" aria-label="Microphone"></select>
                <label class="device-label" for="camSelect">Camera</label>
                <select id="camSelect" class="device-select" aria-label="Camera"></select>
              </div>
            </details>

            <!-- Keypad -->
            <div class="keypad" id="keypad" aria-label="Dial pad"></div>

            <!-- Action buttons row -->
            <div class="dialer-actions">
              <button type="button" id="callBtn" class="btn-action btn-action--call" aria-label="Call" style="flex: 2;">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
                  <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
                <span>Call</span>
              </button>

              <button type="button" id="hangupBtn" class="btn-action btn-action--hangup" aria-label="Hang up" disabled>
                <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor" style="transform:rotate(135deg)">
                  <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
              </button>

              <button type="button" id="clearDialBtn" class="btn-action btn-action--clear" title="Clear">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
                  <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
                </svg>
                <span>Clear</span>
              </button>
            </div>

            <!-- In-call controls -->
            <div class="call-toolbar" id="callToolbar" role="toolbar" aria-label="In-call controls">
              <button type="button" id="muteBtn" class="icon-toggle" disabled aria-pressed="false" aria-label="Mute microphone" title="Mute">
                <svg class="icon-toggle__svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
                <span class="icon-toggle__text">Mic</span>
              </button>
              <button type="button" id="camBtn" class="icon-toggle" disabled aria-pressed="false" aria-label="Turn camera off" title="Camera">
                <svg class="icon-toggle__svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                </svg>
                <span class="icon-toggle__text">Cam</span>
              </button>
            </div>
          </div>
        </section>

        <!-- ─── VIEW: LOCATION / MAP ─── -->
        <section class="view" id="viewLocation">
          <div class="view-header">
            <h2 class="view-title">Location</h2>
            <span id="callDuration" class="call-duration" hidden>00:00</span>
          </div>
          <div id="callMap" class="call-map" role="img" aria-label="Caller and receiver map" style="flex: 1; border-radius: 12px; overflow: hidden; background: #1a2233;"></div>
        </section>

        <!-- ─── VIEW: HISTORY ─── -->
        <section class="view" id="viewHistory">
          <div class="view-header">
            <h2 class="view-title">Recents</h2>
            <button class="view-action-btn" onclick="clearHistory()">Clear</button>
          </div>
          <div class="history-list" id="historyList">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.41 2 2 0 0 1 3.6 1.24h3a2 2 0 0 1 2 1.72 12.05 12.05 0 0 0 .657 2.657 2 2 0 0 1-.45 2.11L7.91 9.91"/></svg>
              <p>No recent calls</p>
            </div>
          </div>
        </section>

        <!-- ─── VIEW: CONTACTS / PHONE BOOK ─── -->
        <section class="view" id="viewContacts">
          <div class="view-header">
            <h2 class="view-title">Contacts</h2>
            <button class="view-action-btn" id="addContactBtn">+ Add</button>
          </div>
          <div class="search-bar-wrap">
            <input type="search" class="search-bar" id="contactSearch" placeholder="Search contacts…" />
          </div>
          <div class="contact-list" id="contactList">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <p>No contacts yet</p>
            </div>
          </div>

          <!-- Call Type Modal -->
          <div class="modal-backdrop" id="callTypeModal" hidden>
            <div class="modal-card">
              <div class="modal-header">
                <span>Choose Call Type</span>
                <button class="modal-close" id="closeCallTypeModal">✕</button>
              </div>
              <p style="padding: 1rem; color: #94a3b8; font-size: 0.875rem; text-align: center;">
                Select how you want to connect with <span id="callTypeNumber" style="font-weight: 600;">—</span>
              </p>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1rem;">
                <button class="auth-submit" id="audioCallBtn" style="background: #6366f1; margin: 0;">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display: inline-block; margin-right: 0.5rem;">
                    <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                  </svg>
                  Call
                </button>
                <button class="auth-submit" id="videoCallBtn" style="background: #8b5cf6; margin: 0;">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display: inline-block; margin-right: 0.5rem;">
                    <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                  </svg>
                  Video
                </button>
              </div>
            </div>
          </div>

          <!-- Add Contact Modal -->
          <div class="modal-backdrop" id="contactModal" hidden>
            <div class="modal-card">
              <div class="modal-header">
                <span>Add Contact</span>
                <button class="modal-close" id="closeContactModal">✕</button>
              </div>
              <div class="auth-field">
                <label class="auth-label" for="newContactName">Name</label>
                <input class="auth-input" id="newContactName" type="text" placeholder="Juan dela Cruz" />
              </div>
              <div class="auth-field">
                <label class="auth-label" for="newContactPhone">Phone / Username</label>
                <input class="auth-input" id="newContactPhone" type="text" placeholder="09171234567 or username" />
              </div>
              <button class="auth-submit" id="saveContactBtn" style="margin-top:0.75rem">Save Contact</button>
            </div>
          </div>
        </section>

        <!-- ─── VIEW: CHAT ─── -->
        <section class="view" id="viewChat">
          <div class="view-header">
            <h2 class="view-title">Messages</h2>
            <span class="chat-conn-badge" id="messagesLine">—</span>
          </div>
          <div class="chat-log" id="chatLog" aria-live="polite"></div>
          <div class="chat-compose">
            <input
              id="chatInput"
              type="text"
              class="chat-input"
              placeholder="Type a message…"
              maxlength="500"
              autocomplete="off"
            />
            <button type="button" id="sendBtn" class="btn-send" aria-label="Send">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </section>

      </main>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-item" id="navDialer" data-view="viewDialer" aria-label="Dialpad" title="Dialpad">
          <div class="nav-item__icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="4" y="2" width="4" height="4" rx="1"/><rect x="10" y="2" width="4" height="4" rx="1"/><rect x="16" y="2" width="4" height="4" rx="1"/>
              <rect x="4" y="9" width="4" height="4" rx="1"/><rect x="10" y="9" width="4" height="4" rx="1"/><rect x="16" y="9" width="4" height="4" rx="1"/>
              <rect x="4" y="16" width="4" height="4" rx="1"/><rect x="10" y="16" width="4" height="4" rx="1"/><rect x="16" y="16" width="4" height="4" rx="1"/>
            </svg>
          </div>
          <span class="nav-item__label">Keypad</span>
        </button>

        <button class="nav-item" id="navLocation" data-view="viewLocation" aria-label="Location" title="Location">
          <div class="nav-item__icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <span class="nav-item__label">Location</span>
        </button>

        <button class="nav-item" id="navHistory" data-view="viewHistory" aria-label="History" title="Recent Calls">
          <div class="nav-item__icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <span class="nav-item__label">History</span>
        </button>

        <button class="nav-item" id="navContacts" data-view="viewContacts" aria-label="Contacts" title="Phone Book">
          <div class="nav-item__icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <span class="nav-item__label">Contacts</span>
        </button>

        <button class="nav-item" id="navChat" data-view="viewChat" aria-label="Messages" title="Chat">
          <div class="nav-item__icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span class="nav-badge" id="chatBadge" hidden>0</span>
          </div>
          <span class="nav-item__label">Chat</span>
        </button>
      </nav>

    </div>
    <!-- ══════════════════════════════════════════════════════════ -->

    <video id="localVideo" autoplay muted playsinline hidden></video>
    <video id="remoteVideo" autoplay playsinline hidden></video>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="./supabase.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
