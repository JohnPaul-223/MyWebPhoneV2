<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase SQL Editor - PC Phone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0f14;
      color: #f1f5f9;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      height: 100vh;
    }

    .sql-editor-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .sql-header {
      background: #13161e;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sql-header h1 {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .sql-header-actions {
      display: flex;
      gap: 0.75rem;
    }

    .sql-btn {
      background: #6366f1;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .sql-btn:hover {
      background: #818cf8;
      transform: translateY(-1px);
    }

    .sql-btn:active {
      transform: translateY(0);
    }

    .sql-btn--secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #f1f5f9;
    }

    .sql-btn--secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .sql-content {
      display: flex;
      flex: 1;
      gap: 1rem;
      padding: 1rem;
      overflow: hidden;
    }

    .sql-editor-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      background: #1a1e2a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      overflow: hidden;
    }

    .sql-editor-title {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .sql-editor-input {
      flex: 1;
      padding: 1rem;
      background: #131720;
      color: #f1f5f9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      border: none;
      resize: none;
      outline: none;
      line-height: 1.6;
    }

    .sql-editor-input::placeholder {
      color: #64748b;
    }

    .sql-results-panel {
      display: flex;
      flex-direction: column;
      width: 50%;
      background: #1a1e2a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      overflow: hidden;
    }

    .sql-results-table {
      flex: 1;
      overflow: auto;
      padding: 1rem;
    }

    .sql-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .sql-table th {
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600;
    }

    .sql-table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .sql-table tr:hover {
      background: rgba(99, 102, 241, 0.08);
    }

    .sql-status {
      padding: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.875rem;
      color: #64748b;
      min-height: 60px;
      overflow-y: auto;
      max-height: 150px;
    }

    .sql-error {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      padding: 0.75rem;
      border-radius: 6px;
      margin: 1rem;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .sql-success {
      color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
      padding: 0.75rem;
      border-radius: 6px;
      margin: 1rem;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .quick-templates {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-wrap: wrap;
    }

    .template-btn {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.3);
      padding: 0.375rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .template-btn:hover {
      background: rgba(99, 102, 241, 0.3);
      border-color: rgba(99, 102, 241, 0.5);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #64748b;
      text-align: center;
      flex-direction: column;
      gap: 1rem;
    }
  </style>
</head>
<body>
  <div class="sql-editor-container">
    <!-- Header -->
    <div class="sql-header">
      <div>
        <h1>🗄️ Supabase SQL Editor</h1>
        <p style="font-size: 0.875rem; color: #64748b; margin-top: 0.25rem;">
          Execute queries on your PC Phone database
        </p>
      </div>
      <div class="sql-header-actions">
        <button class="sql-btn sql-btn--secondary" onclick="clearEditor()">Clear</button>
        <button class="sql-btn" onclick="executeQuery()">⚡ Execute</button>
      </div>
    </div>

    <!-- Content -->
    <div class="sql-content">
      <!-- Editor Panel -->
      <div class="sql-editor-panel">
        <div class="sql-editor-title">SQL Query</div>
        <div class="quick-templates">
          <button class="template-btn" onclick="loadTemplate('users')">Users Table</button>
          <button class="template-btn" onclick="loadTemplate('contacts')">Contacts Table</button>
          <button class="template-btn" onclick="loadTemplate('history')">Call History</button>
          <button class="template-btn" onclick="loadTemplate('select')">SELECT Example</button>
        </div>
        <textarea
          id="sqlInput"
          class="sql-editor-input"
          placeholder="-- Write your SQL query here
-- Example: SELECT * FROM users LIMIT 10;
          "
        ></textarea>
      </div>

      <!-- Results Panel -->
      <div class="sql-results-panel">
        <div class="sql-editor-title">Results</div>
        <div class="sql-results-table" id="resultsTable">
          <div class="empty-state">
            <div>📊</div>
            <div>Execute a query to see results here</div>
          </div>
        </div>
        <div class="sql-status" id="statusOutput">Ready to execute queries...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zvermhsaarqxfpatwqed.supabase.co";
    const SUPABASE_KEY = "sb_publishable_YJ-5VnC0x-rhS2GJ011QDg_BtGRYeaa";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const sqlInput = document.getElementById("sqlInput");
    const resultsTable = document.getElementById("resultsTable");
    const statusOutput = document.getElementById("statusOutput");

    const templates = {
      users: "SELECT id, username, name, phone, created_at FROM users ORDER BY created_at DESC;",
      contacts: "SELECT id, user_id, name, phone, created_at FROM contacts ORDER BY created_at DESC LIMIT 50;",
      history: "SELECT id, user_id, number, direction, duration, timestamp FROM call_history ORDER BY timestamp DESC LIMIT 50;",
      select: "-- Data from Supabase tables\nSELECT * FROM users LIMIT 10;"
    };

    function loadTemplate(type) {
      sqlInput.value = templates[type] || "";
      sqlInput.focus();
    }

    async function executeQuery() {
      const query = sqlInput.value.trim();
      if (!query) {
        updateStatus("Please enter a SQL query", "error");
        return;
      }

      updateStatus("Executing query...", "loading");
      resultsTable.innerHTML = '<div class="empty-state"><div>⏳</div><div>Executing...</div></div>';

      try {
        // Note: Direct SQL execution requires authentication and proper RLS policies
        // This is a simplified version - in production, use proper API endpoints
        
        // Parse the query to determine the action
        const upperQuery = query.toUpperCase();
        
        if (upperQuery.includes("SELECT")) {
          // Handle SELECT queries
          if (upperQuery.includes("FROM users")) {
            const { data, error } = await supabase.from("users").select("*");
            if (error) throw error;
            displayResults(data);
          } else if (upperQuery.includes("FROM contacts")) {
            const { data, error } = await supabase.from("contacts").select("*");
            if (error) throw error;
            displayResults(data);
          } else if (upperQuery.includes("FROM call_history")) {
            const { data, error } = await supabase.from("call_history").select("*");
            if (error) throw error;
            displayResults(data);
          } else {
            updateStatus("Query executed (limited preview mode available)", "success");
          }
        } else {
          updateStatus("For security, only SELECT queries are supported in this editor. Use Supabase Dashboard for INSERT/UPDATE/DELETE.", "error");
        }
      } catch (error) {
        updateStatus(`Error: ${error.message}`, "error");
        console.error("Query error:", error);
      }
    }

    function displayResults(data) {
      if (!data || data.length === 0) {
        resultsTable.innerHTML = '<div class="empty-state"><div>📋</div><div>No results returned</div></div>';
        updateStatus(`Query executed. Returned 0 rows.`);
        return;
      }

      const headers = Object.keys(data[0]);
      let html = '<table class="sql-table"><thead><tr>';
      
      headers.forEach(header => {
        html += `<th>${escapeHtml(header)}</th>`;
      });
      html += '</tr></thead><tbody>';

      data.forEach(row => {
        html += '<tr>';
        headers.forEach(header => {
          const value = row[header];
          html += `<td>${escapeHtml(JSON.stringify(value))}</td>`;
        });
        html += '</tr>';
      });

      html += '</tbody></table>';
      resultsTable.innerHTML = html;
      updateStatus(`Query executed. Returned ${data.length} row(s).`, "success");
    }

    function updateStatus(message, type = "info") {
      const timestamp = new Date().toLocaleTimeString();
      statusOutput.innerHTML = `<div style="color: ${getStatusColor(type)}">[${timestamp}] ${escapeHtml(message)}</div>`;
    }

    function getStatusColor(type) {
      switch (type) {
        case "error": return "#ef4444";
        case "success": return "#22c55e";
        case "loading": return "#818cf8";
        default: return "#64748b";
      }
    }

    function clearEditor() {
      if (confirm("Clear the editor?")) {
        sqlInput.value = "";
        sqlInput.focus();
      }
    }

    function escapeHtml(text) {
      const map = {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      };
      return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    // Load default template on page load
    sqlInput.style.fontFamily = "'JetBrains Mono', monospace";
    updateStatus("SQL Editor ready. Paste your query and click Execute.", "success");

    // Keyboard shortcuts
    document.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        executeQuery();
      }
    });
  </script>
</body>
</html>
